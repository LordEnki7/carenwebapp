<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic C.A.R.E.N. Authentication Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Futuristic Background */
        .cyber-background {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .cyber-background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(57, 255, 20, 0.05) 0%, transparent 50%);
            animation: cyber-pulse 4s ease-in-out infinite alternate;
        }

        @keyframes cyber-pulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        /* Floating Particles */
        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 212, 255, 0.8);
            border-radius: 50%;
            animation: float-up 6s linear infinite;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(50px);
                opacity: 0;
            }
        }

        /* Glass Morphism Card */
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            z-index: 10;
            position: relative;
        }

        /* Scan Line Effect */
        .scan-line {
            position: relative;
            overflow: hidden;
        }

        .scan-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-2px); }
            100% { transform: translateY(500px); }
        }

        /* Header Styling */
        .header {
            text-align: center;
            padding: 30px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .cyber-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, #00d4ff, #8a2be2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            filter: drop-shadow(0 0 20px #00d4ff);
            animation: logo-glow 2s ease-in-out infinite alternate;
            position: relative;
        }

        .cyber-logo::after {
            content: '';
            position: absolute;
            top: -5px;
            right: -5px;
            width: 12px;
            height: 12px;
            background: #39ff14;
            border-radius: 50%;
            box-shadow: 0 0 10px #39ff14;
        }

        @keyframes logo-glow {
            0% {
                filter: drop-shadow(0 0 10px #00d4ff);
            }
            100% {
                filter: drop-shadow(0 0 30px #00d4ff) drop-shadow(0 0 20px #8a2be2);
            }
        }

        .cyber-text {
            background: linear-gradient(45deg, #00d4ff, #8a2be2, #39ff14);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s ease infinite;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .tagline {
            color: #00d4ff;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .status-indicators {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.8rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #00d4ff;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #39ff14;
            box-shadow: 0 0 10px #39ff14;
        }

        /* Tab System */
        .tabs {
            padding: 20px 30px 0;
        }

        .tab-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-button {
            background: linear-gradient(45deg, rgba(0, 212, 255, 0.1), rgba(138, 43, 226, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-button.active {
            background: linear-gradient(45deg, rgba(0, 212, 255, 0.3), rgba(138, 43, 226, 0.3));
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .tab-button:hover {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            transform: translateY(-1px);
        }

        /* Form Styling */
        .form-container {
            padding: 0 30px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #00d4ff;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .cyber-input {
            width: 100%;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .cyber-input:focus {
            border-color: #00d4ff;
            box-shadow: 
                0 0 10px rgba(0, 212, 255, 0.3),
                inset 0 0 10px rgba(0, 212, 255, 0.1);
            outline: none;
        }

        .cyber-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .cyber-button {
            width: 100%;
            background: linear-gradient(45deg, rgba(0, 212, 255, 0.2), rgba(138, 43, 226, 0.2));
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .cyber-button:hover {
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.5),
                inset 0 0 20px rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 20px 30px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            font-size: 0.8rem;
        }

        /* Create particles */
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 4s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 0.5s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 1.5s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 2.5s; }
        .particle:nth-child(10) { left: 15%; animation-delay: 3.5s; }
    </style>
</head>
<body>
    <div class="cyber-background">
        <!-- Floating Particles -->
        <div class="floating-particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <!-- Main Authentication Container -->
        <div class="glass-morphism scan-line">
            <!-- Header -->
            <div class="header">
                <div class="cyber-logo">C</div>
                <h1 class="cyber-text">C.A.R.E.N.</h1>
                <p class="tagline">Citizen Assistance for Roadside Emergencies and Navigation</p>
                
                <div class="status-indicators">
                    <div class="status-item">
                        <div class="status-dot"></div>
                        <span>Secure</span>
                    </div>
                    <div class="status-item">
                        <div class="status-dot"></div>
                        <span>AI-Powered</span>
                    </div>
                    <div class="status-item">
                        <div class="status-dot"></div>
                        <span>Online</span>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab-list">
                    <button class="tab-button active">
                        📱 Sign In
                    </button>
                    <button class="tab-button">
                        ➕ Create Account
                    </button>
                </div>

                <!-- Form -->
                <div class="form-container">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="cyber-input" placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="cyber-input" placeholder="Enter your password">
                    </div>

                    <button class="cyber-button">
                        ⚡ Access System
                    </button>

                    <button class="cyber-button">
                        🔍 Biometric Login
                    </button>

                    <button class="cyber-button">
                        🎤 Enable Voice Commands
                    </button>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                Secured by quantum encryption • AI-powered legal protection
            </div>
        </div>
    </div>
</body>
</html>
