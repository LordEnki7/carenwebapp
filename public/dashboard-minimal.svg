<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <text x="400" y="60" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">C.A.R.E.N.™ Dashboard</text>
  <text x="400" y="85" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">Citizen Assistance for Roadside Emergencies and Navigation</text>
  
  <!-- Priority Status Cards -->
  <g transform="translate(50, 120)">
    <!-- Priority #1 Card -->
    <rect x="0" y="0" width="320" height="100" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2" rx="12"/>
    <text x="160" y="25" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Priority #1: Emergency Response</text>
    <rect x="130" y="35" width="60" height="20" fill="#10b981" rx="10"/>
    <text x="160" y="48" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">COMPLETE</text>
    <text x="160" y="68" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">10-15 Second Automated Response</text>
    <text x="160" y="82" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">GPS Integration • N8N Webhook Active</text>
    
    <!-- Priority #2 Card -->
    <rect x="370" y="0" width="320" height="100" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="2" rx="12"/>
    <text x="530" y="25" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Priority #2: Journey Progress</text>
    <rect x="485" y="35" width="90" height="20" fill="#8b5cf6" rx="10"/>
    <text x="530" y="48" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">OPERATIONAL</text>
    <text x="530" y="68" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">6ms Response • 100% Success Rate</text>
    <text x="530" y="82" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">Sparkle Effects • Milestone Tracking</text>
  </g>
  
  <!-- Journey Progress Tracker -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="700" height="80" fill="url(#cardGradient)" stroke="rgba(236,72,153,0.3)" stroke-width="1" rx="10"/>
    <text x="20" y="25" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white">User Journey Progress</text>
    <text x="680" y="25" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="end">Level 1 • 65 Points</text>
    
    <!-- Progress Bar -->
    <rect x="20" y="35" width="640" height="8" fill="rgba(255,255,255,0.2)" rx="4"/>
    <rect x="20" y="35" width="416" height="8" fill="url(#cardGradient)" rx="4"/>
    
    <text x="20" y="60" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">✨ Recent: Dashboard Access (+5 points) • Emergency Activation (+10 points)</text>
  </g>
  
  <!-- Quick Actions Grid -->
  <g transform="translate(50, 360)">
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="white">Quick Actions</text>
    
    <!-- Row 1 -->
    <rect x="0" y="35" width="220" height="80" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="8"/>
    <text x="15" y="55" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">🚨 Emergency Pullover</text>
    <text x="15" y="75" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">10-15 second automated emergency</text>
    <text x="15" y="88" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">response with GPS coordination</text>
    
    <rect x="240" y="35" width="220" height="80" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="8"/>
    <text x="255" y="55" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">⚖️ Know Your Rights</text>
    <text x="255" y="75" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">State-specific legal protections</text>
    <text x="255" y="88" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">and constitutional rights info</text>
    
    <rect x="480" y="35" width="220" height="80" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="8"/>
    <text x="495" y="55" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">🎤 Smart Auto Mute</text>
    <text x="495" y="75" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Hands-free call protection</text>
    <text x="495" y="88" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">during traffic stops</text>
    
    <!-- Row 2 -->
    <rect x="0" y="130" width="220" height="80" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="8"/>
    <text x="15" y="150" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">🛡️ De-Escalation Guide</text>
    <text x="15" y="170" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Professional safety guidance</text>
    <text x="15" y="183" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">for law enforcement encounters</text>
    
    <rect x="240" y="130" width="220" height="80" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="8"/>
    <text x="255" y="150" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">📹 Record Evidence</text>
    <text x="255" y="170" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Multi-device audio/video recording</text>
    <text x="255" y="183" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">with GPS coordinate embedding</text>
    
    <rect x="480" y="130" width="220" height="80" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="8"/>
    <text x="495" y="150" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">👨‍💼 Contact Attorney</text>
    <text x="495" y="170" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Secure attorney-client communication</text>
    <text x="495" y="183" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">with end-to-end encryption</text>
  </g>
  
  <!-- Platform Features -->
  <g transform="translate(50, 620)">
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="white">Platform Features</text>
    
    <!-- Row 1 -->
    <rect x="0" y="35" width="330" height="60" fill="rgba(255,255,255,0.06)" rx="6"/>
    <text x="15" y="55" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">🌍 GPS Integration</text>
    <text x="15" y="72" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Real-time location detection and state-specific legal rights</text>
    <text x="15" y="85" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Automatic emergency response coordination</text>
    
    <rect x="350" y="35" width="330" height="60" fill="rgba(255,255,255,0.06)" rx="6"/>
    <text x="365" y="55" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">🎯 Voice Commands</text>
    <text x="365" y="72" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">200+ voice patterns for hands-free emergency activation</text>
    <text x="365" y="85" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Constitutional rights commands and navigation</text>
    
    <!-- Row 2 -->
    <rect x="0" y="110" width="330" height="60" fill="rgba(255,255,255,0.06)" rx="6"/>
    <text x="15" y="130" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">📱 Mobile PWA</text>
    <text x="15" y="147" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Cross-platform app with offline emergency functionality</text>
    <text x="15" y="160" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">iOS and Android native app capability</text>
    
    <rect x="350" y="110" width="330" height="60" fill="rgba(255,255,255,0.06)" rx="6"/>
    <text x="365" y="130" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">🔐 End-to-End Encryption</text>
    <text x="365" y="147" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Secure attorney communications and evidence management</text>
    <text x="365" y="160" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Complete data privacy and protection</text>
    
    <!-- Row 3 -->
    <rect x="0" y="185" width="330" height="60" fill="rgba(255,255,255,0.06)" rx="6"/>
    <text x="15" y="205" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">⏱️ Real-time Sync</text>
    <text x="15" y="222" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">WebSocket integration for live cross-device coordination</text>
    <text x="15" y="235" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Multi-device Bluetooth integration support</text>
    
    <rect x="350" y="185" width="330" height="60" fill="rgba(255,255,255,0.06)" rx="6"/>
    <text x="365" y="205" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">🏆 Achievement System</text>
    <text x="365" y="222" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Gamified user journey with milestone tracking and rewards</text>
    <text x="365" y="235" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Sparkle effects and progress visualization</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(50, 900)">
    <rect x="0" y="0" width="700" height="80" fill="rgba(255,255,255,0.05)" rx="8"/>
    <text x="350" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Both Priority #1 (Emergency Response) and Priority #2 (Journey Progress)</text>
    <text x="350" y="45" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">automation systems are 100% operational</text>
    <text x="350" y="65" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">C.A.R.E.N.™ Platform • Advanced Legal Protection Technology • 2025</text>
  </g>
</svg>