<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="#F9FAFB" rx="12"/>
  
  <!-- Shield Icon with Tech Elements -->
  <g transform="translate(30, 40)">
    <!-- Main Shield -->
    <path d="M40 10 L10 25 L10 75 Q10 95 40 105 Q70 95 70 75 L70 25 Z" 
          fill="url(#logoGradient)" 
          filter="url(#glow)" 
          stroke="#1E40AF" 
          stroke-width="2"/>
    
    <!-- Tech Circuit Lines -->
    <line x1="25" y1="35" x2="55" y2="35" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <line x1="25" y1="45" x2="45" y2="45" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="55" x2="55" y2="55" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Central Tech Symbol -->
    <circle cx="40" cy="50" r="8" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="40" cy="50" r="4" fill="url(#logoGradient)"/>
    
    <!-- GPS/Location Dots -->
    <circle cx="30" cy="40" r="2" fill="#FFFFFF"/>
    <circle cx="50" cy="40" r="2" fill="#FFFFFF"/>
    <circle cx="40" cy="70" r="2" fill="#FFFFFF"/>
  </g>
  
  <!-- Main Text: C.A.R.E.N.™ -->
  <g transform="translate(120, 70)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" 
          font-size="42" font-weight="700" fill="url(#textGradient)" letter-spacing="-1px">
      C.A.R.E.N.™
    </text>
  </g>
  
  <!-- Tagline -->
  <g transform="translate(120, 95)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" 
          font-size="12" font-weight="500" fill="#6B7280" letter-spacing="0.5px">
      CITIZEN ASSISTANCE FOR ROADSIDE
    </text>
    <text x="0" y="16" font-family="system-ui, -apple-system, sans-serif" 
          font-size="12" font-weight="500" fill="#6B7280" letter-spacing="0.5px">
      EMERGENCIES AND NAVIGATION
    </text>
  </g>
  
  <!-- Accent Elements -->
  <g transform="translate(340, 50)">
    <!-- Emergency Signal Waves -->
    <circle cx="20" cy="20" r="8" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.6">
      <animate attributeName="r" values="8;16;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="20" r="4" fill="#EF4444" opacity="0.8"/>
  </g>
  
  <!-- Bottom Tech Line -->
  <line x1="30" y1="170" x2="370" y2="170" stroke="url(#logoGradient)" stroke-width="3" opacity="0.4"/>
  
  <!-- Version/Status Indicator -->
  <g transform="translate(300, 145)">
    <rect x="0" y="0" width="80" height="20" fill="#10B981" opacity="0.1" rx="10"/>
    <text x="40" y="14" font-family="system-ui, -apple-system, sans-serif" 
          font-size="10" font-weight="600" fill="#10B981" text-anchor="middle">
      OPERATIONAL
    </text>
  </g>
</svg>