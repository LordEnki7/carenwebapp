<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>CAREN - Constitutional Rights & Emergency Network</title>
    <meta name="description" content="Legal rights platform with GPS-aware assistance, incident recording, and emergency features" />
    <meta name="theme-color" content="#1f2937" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CAREN" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#1f2937" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #050510; }
      #caren-diag {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #050510; color: #00ffff;
        font-family: 'Courier New', monospace; font-size: 13px;
        padding: 24px 20px; z-index: 99999;
        overflow-y: auto;
      }
      #caren-diag .title {
        color: #ff6b35; font-size: 18px; font-weight: bold;
        margin-bottom: 16px; text-align: center;
      }
      #caren-diag .line { padding: 3px 0; border-bottom: 1px solid #111; }
      #caren-diag .ok { color: #00ff88; }
      #caren-diag .err { color: #ff4444; background: #1a0000; padding: 8px; border-radius: 4px; margin: 4px 0; }
      #caren-diag .info { color: #aaaaff; }
      #caren-diag .warn { color: #ffaa00; }
    </style>

    <script>
      // Show diagnostic immediately — hidden only when React successfully mounts
      var diagLines = [];

      function diagAdd(msg, cls) {
        cls = cls || 'info';
        var el = document.getElementById('diag-body');
        if (el) {
          var d = document.createElement('div');
          d.className = 'line ' + cls;
          d.textContent = new Date().toISOString().substr(11, 8) + ' ' + msg;
          el.appendChild(d);
        }
        diagLines.push(cls + ': ' + msg);
      }

      window.onerror = function(msg, src, line, col, err) {
        var stack = err && err.stack ? err.stack : '';
        diagAdd('JS ERROR: ' + msg, 'err');
        if (src) diagAdd('  at ' + src + ':' + line, 'err');
        if (stack) diagAdd(stack.split('\n').slice(0,3).join(' | '), 'err');
        return false;
      };

      window.onunhandledrejection = function(e) {
        var r = e.reason;
        var msg = r instanceof Error ? r.message : String(r);
        if (msg.indexOf('wss://localhost') !== -1) return;
        diagAdd('PROMISE REJECT: ' + msg, 'err');
      };

      // Signal React mounted successfully → hide diagnostic
      window.carenDiagHide = function() {
        var el = document.getElementById('caren-diag');
        if (el) el.style.display = 'none';
      };

      document.addEventListener('DOMContentLoaded', function() {
        diagAdd('HTML loaded OK', 'ok');
        diagAdd('URL: ' + window.location.href, 'info');
        diagAdd('Capacitor: ' + (window.Capacitor ? 'DETECTED ✓' : 'not detected'), window.Capacitor ? 'ok' : 'warn');
        diagAdd('UA: ' + navigator.userAgent.substr(0, 80), 'info');
        diagAdd('Waiting for React bundle...', 'info');
      });
    </script>
  </head>
  <body>
    <!-- Diagnostic screen — visible immediately, hidden when React loads -->
    <div id="caren-diag">
      <div class="title">⚡ C.A.R.E.N. LOADING</div>
      <div id="diag-body">
        <div class="line info">Starting up...</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
