name: Build Android AAB for Google Play Store

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-aab:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    - name: Build Web App for Production
      env:
        VITE_PRODUCTION_API_URL: https://citizen-care-projectdna7.replit.app
        NODE_ENV: production
      run: |
        npx vite build
        npx esbuild server/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist

    - name: Sync Capacitor Android
      run: npx cap sync android

    - name: Write Android local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

    - name: Create Release Keystore
      run: |
        cd android
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > caren-release.jks

    - name: Build Android App Bundle (AAB)
      env:
        CAREN_KEYSTORE_FILE: caren-release.jks
        CAREN_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        CAREN_KEY_ALIAS: caren-key
        CAREN_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        chmod +x gradlew
        ./gradlew bundleRelease --no-daemon

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: caren-app-release-aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 30

    - name: Display Build Info
      run: |
        echo "Build completed!"
        ls -lh android/app/build/outputs/bundle/release/
